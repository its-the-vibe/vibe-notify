# vibe-notify configuration example
# Copy this file to config.yaml and fill in your values.
# Do NOT commit config.yaml – it is already in .gitignore.

# SlackLiner service base URL (required) – e.g. http://localhost:8080
slackliner_url: "http://localhost:8080"

# Slack channel to post notifications to (optional – defaults to the SlackLiner/bot default)
slack_channel: "#general"

# How long the message should be kept before auto-deletion via TimeBomb (0 = never).
# Accepts a Go duration string (e.g. "48h", "1h30m", "30m") or a plain integer in seconds.
message_ttl: "48h"

# GitHub personal access token (optional – only needed for private repositories).
# Can also be set via the GITHUB_TOKEN environment variable or a .env file.
github_token: ""
